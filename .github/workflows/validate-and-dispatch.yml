name: Validate docs and notify site

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

jobs:
  validate-and-dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Validate docs frontmatter and meta.json
        run: node scripts/validate-docs.mjs

      - name: Notify jaysync-lab-site to rebuild
        if: success()
        run: |
          curl -f -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_DISPATCH_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/JaySync-Lab/jaysync-lab-site/dispatches \
            -d '{"event_type":"docs-updated","client_payload":{"sha":"${{ github.sha }}"}}'
